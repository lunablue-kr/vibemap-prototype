<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>우리동네 바이브</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Jua&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="./css/tokens.css" />
  <link rel="stylesheet" href="./css/base.css" />
  <link rel="stylesheet" href="./css/components.css" />
</head>
<body>
  <!-- 개발용 위치 시뮬레이션 (프로토타입 전용, 실제 앱은 위치 SDK) -->
  <div id="dev-bar">
    <span>🧪 위치</span>
    <select id="dev-location"><option value="">꺼짐</option></select>
    <span class="wireframe-badge">v2 · 캔디 수채</span>
  </div>

  <!-- 지도 = 앱 (상시 전체화면, 하단 탭 없음) -->
  <main id="map-wrap">
    <div id="map"></div>

    <!-- 플로팅 요소: 랭킹 롤링 칩(탭=랭킹 시트) + 마이 아이콘(탭=마이 시트) -->
    <div id="floating-top">
      <button id="rank-chip" aria-label="주간 랭킹 열기"></button>
      <button id="my-icon" aria-label="마이 열기"></button>
    </div>

    <!-- 태그 완전체 카드 팝업 (1탭) -->
    <div id="tag-popup" class="popup-card" hidden></div>

    <!-- 인라인 말풍선 작성창 (빈 공간 터치) -->
    <div id="composer" class="composer-balloon" hidden></div>

    <!-- 데이터 출처 (앱인토스 외부 유도 금지 — 링크 없는 텍스트) -->
    <div id="data-credit">구 경계: 통계청 SGIS(2013) · southkorea/seoul-maps</div>
  </main>

  <!-- 시트: 유저 액션으로만 열림 (자동 오픈 금지) -->
  <div id="sheet-dim" hidden></div>
  <section id="sheet-district" class="sheet bottom"></section>
  <section id="sheet-ranking" class="sheet full"></section>
  <section id="sheet-my" class="sheet full"></section>

  <div id="toast" role="status"></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script type="module" src="./js/app.js"></script>
</body>
</html>
